<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#2e2e3d"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </radialGradient>
    <linearGradient id="bodyFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#555568"/>
      <stop offset="20%" stop-color="#cccce0"/>
      <stop offset="52%" stop-color="#b8b8d0"/>
      <stop offset="100%" stop-color="#444456"/>
    </linearGradient>
    <linearGradient id="topFace" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#eeeef8"/>
      <stop offset="100%" stop-color="#9090b0"/>
    </linearGradient>
    <linearGradient id="divFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d0d0e8"/>
      <stop offset="100%" stop-color="#8888a8"/>
    </linearGradient>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- Subtle inner ring -->
  <circle cx="200" cy="200" r="193" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.08"/>

  <!-- === DB Cylinder: rx=82, top y=78, bottom y=252 === -->

  <!-- Body -->
  <path d="M 118,78 L 118,252 A 82,21 0 0,0 282,252 L 282,78 Z" fill="url(#bodyFill)"/>

  <!-- Left highlight streak -->
  <path d="M 118,78 L 118,252" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.12"/>
  <!-- Right shadow streak -->
  <path d="M 282,78 L 282,252" fill="none" stroke="black" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Divider 1 at y=134 -->
  <ellipse cx="200" cy="134" rx="82" ry="21" fill="url(#divFace)"/>
  <ellipse cx="200" cy="131" rx="76" ry="17" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.28"/>

  <!-- Divider 2 at y=190 -->
  <ellipse cx="200" cy="190" rx="82" ry="21" fill="url(#divFace)"/>
  <ellipse cx="200" cy="187" rx="76" ry="17" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.28"/>

  <!-- Divider 3 / bottom face at y=246 -->
  <ellipse cx="200" cy="246" rx="82" ry="21" fill="#404055"/>
  <ellipse cx="200" cy="244" rx="82" ry="21" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.12"/>

  <!-- Top face -->
  <ellipse cx="200" cy="78" rx="82" ry="21" fill="url(#topFace)" filter="url(#softglow)"/>
  <!-- Top specular highlight -->
  <ellipse cx="182" cy="72" rx="44" ry="9" fill="white" fill-opacity="0.28"/>

  <!-- "taitech" text -->
  <text
    x="200"
    y="316"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="50"
    fill="white"
    text-anchor="middle"
    letter-spacing="5"
  >taitech</text>

  <!-- Accent underline -->
  <rect x="156" y="328" width="88" height="3" rx="1.5" fill="white" fill-opacity="0.3"/>
</svg>